<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新文章 · 我的博客</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            padding: 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 24px;
            border-left: 6px solid #3b82f6;
            padding-left: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            transition: border 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #2563eb;
        }
        button:active {
            transform: scale(0.98);
        }
        #result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        #result.success {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
            display: block;
        }
        #result.error {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
            display: block;
        }
        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✍️ 发布新文章</h1>
        <form id="postForm">
            <label for="title">标题</label>
            <input type="text" id="title" name="title" placeholder="例如：我的第一篇博客" required>

            <label for="content">内容</label>
            <textarea id="content" name="content" rows="6" placeholder="在这里写下你的想法……" required></textarea>

            <button type="submit">发布文章</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('postForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const resultDiv = document.getElementById('result');

            // 清空样式
            resultDiv.className = '';
            resultDiv.style.display = 'block';
            resultDiv.textContent = '⏳ 发布中...';

            try {
                const response = await fetch('/post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.classList.add('success');
                    resultDiv.textContent = `✅ 发布成功！文章ID：${data.id}`;
                    document.getElementById('postForm').reset();
                } else {
                    resultDiv.classList.add('error');
                    resultDiv.textContent = `❌ 发布失败：${data.error || '未知错误'}`;
                }
            } catch (error) {
                resultDiv.classList.add('error');
                resultDiv.textContent = `❌ 网络错误：${error.message}`;
            }
        });
    </script>
</body>
</html>
